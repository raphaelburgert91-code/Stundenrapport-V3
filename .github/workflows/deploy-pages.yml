name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Produktionsdateien hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
